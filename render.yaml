services:
  - type: web
    name: todo-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  - type: static
    name: todo-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
